      function openNav() {
        ps = document.getElementById("pageselector");

      function closeNav() {
         ps = document.getElementById("pageselector");
        setTimeout(function() {
          if (!ps.matches(':hover')) {
            ps.classList.add('hide');
          }
        }, 2000);
      }
      function removejscssfile(filename, filetype){
        var targetelement=(filetype=="js")? "script" : (filetype=="css")? "link" : "none" //determine element type to create nodelist from
        var targetattr=(filetype=="js")? "src" : (filetype=="css")? "href" : "none" //determine corresponding attribute to test for
        var allsuspects=document.getElementsByTagName(targetelement)
          for (var i=allsuspects.length; i>=0; i--){ //search backwards within nodelist for matching elements to remove
          if (allsuspects[i] && allsuspects[i].getAttribute(targetattr)!=null && allsuspects[i].getAttribute(targetattr).indexOf(filename)!=-1)
              allsuspects[i].parentNode.removeChild(allsuspects[i]) //remove element by calling parentNode.removeChild()
          }
      }
      document.onreadystatechange = () => {
        if (document.readyState === 'complete') {
          removejscssfile("boostbook.css", "css")
          var guide = document.getElementById("guideMenu")
          guide.classList.remove("hidden");
        }
      }
    </script>

      function removejscssfile(filename, filetype){
        var targetelement=(filetype==&quot;js&quot;)? &quot;script&quot; : (filetype==&quot;css&quot;)? &quot;link&quot; : &quot;none&quot; //determine element type to create nodelist from
        var targetattr=(filetype==&quot;js&quot;)? &quot;src&quot; : (filetype==&quot;css&quot;)? &quot;href&quot; : &quot;none&quot; //determine corresponding attribute to test for
        var allsuspects=document.getElementsByTagName(targetelement)
          for (var i=allsuspects.length; i&gt;=0; i--){ //search backwards within nodelist for matching elements to remove
          if (allsuspects[i] &amp;&amp; allsuspects[i].getAttribute(targetattr)!=null &amp;&amp; allsuspects[i].getAttribute(targetattr).indexOf(filename)!=-1)
              allsuspects[i].parentNode.removeChild(allsuspects[i]) //remove element by calling parentNode.removeChild()
          }
      }
      document.onreadystatechange = () =&gt; {
        if (document.readyState === &#x27;complete&#x27;) {
          removejscssfile(&quot;boostbook.css&quot;, &quot;css&quot;)
          var guide = document.getElementById(&quot;guideMenu&quot;)
          guide.classList.remove(&quot;hidden&quot;);

&lt;h1 class=&quot;page&quot;&gt;The Boost Software License&lt;/h1&gt;
&lt;div id=&quot;preamble&quot;&gt;
&lt;div class=&quot;sectionbody&quot;&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;This section contains the current Boost Software License verbatim, and is followed by a rationale on why using this license is recommended.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;sect1&quot;&gt;
&lt;h2 id=&quot;_boost_software_license_version_1_0_august_17th_2003&quot;&gt;&lt;a class=&quot;anchor&quot; href=&quot;#_boost_software_license_version_1_0_august_17th_2003&quot;&gt;&lt;/a&gt;Boost Software License - Version 1.0 - August 17th, 2003&lt;/h2&gt;
&lt;div class=&quot;sectionbody&quot;&gt;
&lt;div class=&quot;quoteblock&quot;&gt;
&lt;blockquote&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;Permission is hereby granted, free of charge, to any person or organization

&lt;div class=&quot;sect1&quot;&gt;
&lt;h2 id=&quot;_rationale&quot;&gt;&lt;a class=&quot;anchor&quot; href=&quot;#_rationale&quot;&gt;&lt;/a&gt;Rationale&lt;/h2&gt;
&lt;div class=&quot;sectionbody&quot;&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;Why You Should Use the Boost Software License? Because it doesn’t require attribution for binaries.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;All popular licenses - MIT, Apache, BSD - contain language similar to the following:&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;ulist disc&quot;&gt;
&lt;ul class=&quot;disc&quot;&gt;
&lt;li&gt;
&lt;p&gt;&quot;The above copyright notice and this permission notice shall be included in all copies or substantial portions of the Software.&quot;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;And, in fact, so does the Boost license, except it continues with:&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;ulist disc&quot;&gt;
&lt;ul class=&quot;disc&quot;&gt;
&lt;li&gt;
&lt;p&gt;&quot;unless such copies or derivative works are solely in the form of machine-executable object code generated by a source language processor.&quot;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;The others contain no such exemption.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;For the purposes of copyright law, when you compile the source text, the resulting object code, library code or executable program is considered a derived work. That is, the original license terms still apply to it as they would have applied to a copy of the source code, processed in some other way (reformatted, for instance.)&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;What this means is that the requirement to include the copyright notice still applies. This, in practice, is met by either including the copyright notice in the documentation, having a dialog box or a &lt;code&gt;--license&lt;/code&gt; command line option that displays the license, or sometimes both (lawyers like to be on the safe side.)&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;If you’re writing an open source C++ library, it’s much more convenient for your users if you don’t impose this attribution requirement for binaries. You still want it to apply to copies in source code form, just not to compiled code.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;This is what the Boost Software License was created to enable, and this is why you should use it for your open source libraries.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;The Boost Software License is not just for Boost libraries. Everyone can, and should, use it.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;It’s true that it’s a requirement to get your code in Boost, but that’s not the only benefit. It can also get your code in standard library implementations. Microsoft’s STL, for example, is now &lt;a href=&quot;https://github.com/microsoft/STL&quot;&gt;open source on Github&lt;/a&gt;, but since Microsoft’s customers cannot abide by a binary attribution clause, code inside the STL can only use a license that doesn’t impose one. As explained by Stephan T. Lavavej in this &lt;a href=&quot;https://www.reddit.com/r/cpp/comments/gr18ig/comment/frxbit4/&quot;&gt;Reddit comment&lt;/a&gt;, the two licenses that meet this requirement are the Boost Software License and the Apache 2.0 License with LLVM Exception, and the Boost license is simpler, clearer, better known, and already pre-approved in many organizations.&lt;/p&gt;
&lt;/div&gt;
&lt;div class=&quot;paragraph&quot;&gt;
&lt;p&gt;Use it. The C++ community will appreciate your generosity.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

      function updateVersionAlertHeight() {
        const alert = document.querySelector('.version_alert');
        if (alert && document.getElementById('docsiframe')) {
          document.documentElement.style.setProperty('--version-alert-height', Math.ceil(alert.getBoundingClientRect().height) + 'px');
        }
      }

      (function() {
        const alert = document.querySelector('.version_alert');
        if (!alert) return;

        let rafId = null;
        const update = () => {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(() => {
            updateVersionAlertHeight();
            rafId = null;
          });
        };

        requestAnimationFrame(updateVersionAlertHeight);
        window.addEventListener('resize', update);
        if (window.ResizeObserver) {
          new ResizeObserver(update).observe(alert);
        }
      })();

      function iframeCustomizations(iframe) {
        let iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        
        addClickInterception(iframeDoc);
        addBase(iframeDoc);
        if (window.location.hash) {
           scrollToAnchor(iframeDoc, window.location.hash.slice(1));
        }
        // Try targeting different containers for AsciiDoc
        const scrollContainer = iframeDoc.querySelector('.sect1, #content, body') || iframeDoc.documentElement;
        scrollContainer.style.scrollBehavior = 'smooth';
      }

      function resizeIframe(obj) {
        obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
      }

      function scrollToAnchor(iframeDoc, hash) {
        const targetElement = iframeDoc.getElementById(hash);
        if (!targetElement) return;

          // Add space above the target element - more space on mobile
          const isMobile = window.innerWidth < 768;
          const topMargin = isMobile ? 50 : 14;

        // Detect document type
        const isAntora = !!iframeDoc.querySelector('.doc, .source-docs-antora');

        // First try method 1: scrollIntoView
        targetElement.scrollIntoView({block: "start", behavior: "auto"});

        // Then apply adjustments based on document type
        setTimeout(() => {
          try {
            // Method 2: Calculate position and use multiple scroll APIs
            const rect = targetElement.getBoundingClientRect();
            const scrollY = iframeDoc.defaultView.pageYOffset || iframeDoc.documentElement.scrollTop;
            const targetY = rect.top + scrollY - topMargin;

            // Use both direct property setting and scrollTo API
            iframeDoc.documentElement.scrollTop = targetY;
            iframeDoc.body.scrollTop = targetY; // For Safari

            if (isAntora) {
              // For Antora, use the defaultView scroll methods
          iframeDoc.defaultView.scrollTo({
                top: targetY,
                behavior: 'smooth'
              });
            } else {
              // For AsciiDoc, use all available scroll targets
              iframeDoc.documentElement.scrollTo({
                top: targetY,
            behavior: 'smooth'
          });

              // Special handling for AsciiDoc documents with scrollable content areas
              const scrollableContent = iframeDoc.querySelector('#content, .content');
              if (scrollableContent) {
                scrollableContent.scrollTop = targetElement.offsetTop - topMargin;
              }
            }
          } catch (e) {
            console.error('Scroll adjustment error:', e);
          }
        }, 10);
      }

      function addClickInterception(iframeDoc) {
        let anchorLinks = iframeDoc.querySelectorAll('a[href*="#"]');
        anchorLinks.forEach(function (anchor) {
          anchor.addEventListener('click', function (event) {
            event.preventDefault();

            const href = this.getAttribute('href');
            const hrefSplit = href.split('#');
            const pageUrl = hrefSplit[0] || '';
            const anchorId = hrefSplit[1] || '';

            if (!anchorId) return;

            // Same page anchor - handle internally
            if (!pageUrl || window.location.href.includes(pageUrl)) {
              scrollToAnchor(iframeDoc, anchorId);
            } else {
              // Different page with anchor - use parent navigation
              parent.window.location.href = href;
            }
          });
        });
      }

      function addBase(iframeDoc) {
        let base = iframeDoc.createElement('base');
        base.setAttribute('target', "_parent"); // Set to an appropriate base URL
        let head = iframeDoc.getElementsByTagName('head')[0];
        if (head) {
          head.insertBefore(base, head.firstChild);
        } else {
          head = iframeDoc.createElement('head');
          iframeDoc.documentElement.insertBefore(head, iframeDoc.body);
          head.appendChild(base);
        }
      }
    </script>

      }

      const hideMessage = async () => {
        const message = document.getElementById('messages');
        message.classList.add('opacity-0');
        await delay(opacityTransitionTime * 1000);
        const messageButton = message.querySelector('button');
        if (messageButton) {
          messageButton.click();
        }
      }

      const providerMatchesLastLogin = async (provider) => {
        const lastLoginProvider = localStorage.getItem('boostLoginMethod') || null;
        return provider === lastLoginProvider;
      }

      const trackLoginUpdateCheck = async () => {
        const footer = document.querySelector('footer');
        if (!footer) {
          return;
        }
        const indicator = footer.dataset.trackLoginMethod; // intentionally not cast to boolean
        const loginMethod = footer.dataset.loginMethod;
        if (indicator) {
          if (indicator === 'True') {
            localStorage.setItem('boostLoginMethod', loginMethod);
          } else {
            localStorage.removeItem('boostLoginMethod');
          }
        }
      }

      const changeVersionAndCategory = (event) => {
        const urlPatterns = {
          libraries: {
            regex: /^(https?:\/\/[\S:]+\/libraries\/)([^\/]+)(\/?[a-z]*)(\/?\S*)?\/?$/,
            substitution: (event) => {
              switch (event.target.id) {
                case 'id_category':
                  return `$1$2$3${event.target.value ? `/${event.target.value}` : ''}/`;
                case 'id_version':
                  return `$1${event.target.value}$3$4`;
                default:
                  return null;
              }
            }
          },
          library: {
            regex: /^(https?:\/\/[\S:]+\/library\/)([^\/]+)\/([^\/]+)\/?$/,
            substitution: (event) => `$1${event.target.value}/$3/`
          },
          releases: {
            regex: /^(https?:\/\/[\S:]+\/releases\/)([^\/]+)?\/?$/,
            substitution: (event) => `$1${event.target.value}/`
          }
        };

        const currentUrl = window.location.href;
        for (const key in urlPatterns) {
          const pattern = urlPatterns[key];
          if (pattern.regex.test(currentUrl)) {
            const substitutionString = pattern.substitution(event);
            if (substitutionString) {
              window.location.href = currentUrl.replace(pattern.regex, substitutionString);
            }
            break;
          }
        }
      }

      const manualPlausibleTrigger = async () => {
        window.plausible = window.plausible || function() {
          (window.plausible.q = window.plausible.q || []).push(arguments)
        }
        let loc = window.parent.location.href || window.location.href;
        plausible("pageview", { u: loc + window.location.search });
      };

      window.addEventListener('DOMContentLoaded', () => {
        // resets the form on back button press
        document.getElementById("id_category")?.closest('form').reset();
        document.getElementById("id_version")?.closest('form').reset();
        document.getElementById("id_category")?.addEventListener("change", changeVersionAndCategory);
        document.getElementById("id_version")?.addEventListener("change", changeVersionAndCategory);
        manualPlausibleTrigger();
      });
      (async () => {
        await trackLoginUpdateCheck();
        await delay(messageVisibilitySeconds * 1000);
        await hideMessage();
      })();
   </script>

  </body>

</html>
