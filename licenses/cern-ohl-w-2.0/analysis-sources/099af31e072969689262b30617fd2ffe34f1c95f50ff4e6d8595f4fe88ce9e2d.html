hwr.org/cern_ohl_w_v2.txt), [pdf](https://ohwr.org/cern_ohl_w_v2.pdf)). User guide ([odt](uploads/eb5fac4e02180da7a4d15f99ab48ab7c/cern_ohl_w_v2_howto.odt), [pdf](uploads/c2e5e9d297949b5c2d324a6cbf6adda0/cern_ohl_w_v2_howto.pdf)).\n* A permissive variant, CERN-OHL-P ([txt](https://ohwr.org/cern_ohl_p_v2.txt), [pdf](https://ohwr.org/cern_ohl_p_v2.pdf)). User guide ([odt](uploads/f123aac388675e12b308de0ade1a0278/cern_ohl_p_v2_howto.odt), [pdf](uploads/8a6b5d01f71c207c49493e4d114d61e6/cern_ohl_p_v2_howto.pdf)).\n\nYou may want to read the [rationale](https://gitlab.com/ohwr/project/cernohl/-/wikis/uploads/0be6f561d2b4a686c5765c74be32daf9/CERN_OHL_rationale.pdf) document, which explains the reasons for some of the drafting decisions, and the list of [Frequently Asked Questions](https://gitlab.com/ohwr/project/cernohl/wikis/faq). If you would like to provide feedback on the licence or ask questions, please use the [forum](https://forums.ohwr.org/c/cernohl) so that everybody can benefit from the discussion. For matters you would not like to bring up publicly, feel free to contact the authors ([Myriam Ayass](https://phonebook.cern.ch/phonebook/#personDetails/?id=610905), [Andrew Katz](https://moorcrofts.com/team/andrew-katz/) and [Javier Serrano](https://phonebook.cern.ch/phonebook/#personDetails/?id=476608)) directly.\n\nYou can find some unofficial translations of the licences, along with guidelines on how to contribute new ones, in the [translations page](translations).\n\n\u003c!---\n[cern_ohl_w_v2.pdf](uploads/a9bec43e93eb7fc88a2a3f6a04e88711/cern_ohl_w_v2.pdf)\n[cern_ohl_s_v2.txt](uploads/b0653d1c1c217444303ff096a7641504/cern_ohl_s_v2.txt)\n[cern_ohl_p_v2.txt](uploads/6d8c1ca7dcfa4aad35f344b9ca29ab14/cern_ohl_p_v2.txt)\n[cern_ohl_w_v2.txt](uploads/c18d238c5464cf7794510a956545871b/cern_ohl_w_v2.txt)\n[cern_ohl_s_v2.pdf](uploads/42a8875c4054633b4c68fadb77cb9948/cern_ohl_s_v2.pdf)[cern_ohl_p_v2.pdf](uploads/f90800d5fcbc987b73440091d9afb184/cern_ohl_p_v2.pdf)\n-\u003e\n\n\n\u003c!---\n[cern_ohl_p_v2.pdf](uploads/98ff9662c7ce4252ec91104118c2af8e/cern_ohl_p_v2.pdf)\n[cern_ohl_p_v2.txt](uploads/3eff4154d05e7a0459f3ddbf0674cae4/cern_ohl_p_v2.txt)\n[cern_ohl_s_v2.pdf](uploads/b236492596cfc91c12def7d50bbf7da0/cern_ohl_s_v2.pdf)\n[cern_ohl_s_v2.txt](uploads/819d71bea3458f71fba6cf4fb0f2de6b/cern_ohl_s_v2.txt)\n[cern_ohl_w_v2.pdf](uploads/f773df342791cc55b35ac4f907c78602/cern_ohl_w_v2.pdf)\n[cern_ohl_w_v2.txt](uploads/82b567f43ce515395f7ddbfbad7a8806/cern_ohl_w_v2.txt)\n-\u003e&quot;,&quot;front_matter&quot;:{},&quot;format&quot;:&quot;markdown&quot;,&quot;uploads_path&quot;:&quot;https://gitlab.com/api/v4/projects/68861053/wikis/attachments&quot;,&quot;slug&quot;:&quot;Documents/CERN-OHL-version-2&quot;,&quot;path&quot;:&quot;/ohwr/project/cernohl/-/wikis/Documents/CERN-OHL-version-2&quot;,&quot;wiki_path&quot;:&quot;/ohwr/project/cernohl/-/wikis/home&quot;,&quot;help_path&quot;:&quot;/help/user/project/wiki/_index.md&quot;,&quot;markdown_help_path&quot;:&quot;/help/user/markdown.md&quot;,&quot;markdown_preview_path&quot;:&quot;/ohwr/project/cernohl/-/wikis/Documents/CERN-OHL-version-2/preview_markdown&quot;,&quot;create_path&quot;:&quot;/ohwr/project/cernohl/-/wikis&quot;}" data-page-persisted="false" data-page-version="{&quot;id&quot;:&quot;377d3cf2e2f64c26974225859ad2f7fc0e15c4a7&quot;,&quot;message&quot;:&quot;Fix CERN OHL links\n&quot;,&quot;parent_ids&quot;:[&quot;fb8dbc2f4eb6303155af5dea69d8e280c44dccb5&quot;],&quot;authored_date&quot;:&quot;2025-04-29T21:01:22.000+02:00&quot;,&quot;author_name&quot;:&quot;Vasco Guita&quot;,&quot;author_email&quot;:&quot;vasco@guita.org&quot;,&quot;committed_date&quot;:&quot;2025-04-29T21:01:22.000+02:00&quot;,&quot;committer_name&quot;:&quot;Vasco Guita&quot;,&quot;committer_email&quot;:&quot;vasco@guita.org&quot;,&quot;trailers&quot;:{},&quot;extended_trailers&quot;:{},&quot;referenced_by&quot;:[]}" data-register-path="/users/sign_up?redirect_to_referer=yes" data-report-abuse-path="/-/abuse_report     let imgUrl = img.dataset.src;
    // Only adding width + height for avatars for now
    if (imgUrl.indexOf('/avatar/') > -1 && imgUrl.indexOf('?') === -1) {
      const targetWidth = img.getAttribute('width') || img.width;
      imgUrl += `?width=${targetWidth}`;
    }
    img.src = imgUrl;
    img.removeAttribute('data-src');
    img.classList.remove('lazy');
    img.classList.add('js-lazy-loaded');
    img.dataset.testid = 'js-lazy-loaded-content';
  });
}

</script>
