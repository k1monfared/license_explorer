# Exclude archived third-party HTML from secret scanning.
#
# The deep-analysis pipeline (see .claude/skills/deep-analysis/) fetches
# public HTML pages and stores them verbatim under
# licenses/<id>/analysis-sources/ so every claim on the site is backed by
# the exact bytes used to produce it. Some of those pages happen to be
# Google-owned documentation that embeds Google's own public API keys
# (Analytics, Fonts, Maps) in their <script> tags.
#
# Those keys are NOT ours. They're the site owner's own public keys,
# embedded for the site's own use. scripts/archive-source.mjs now redacts
# AIza…, AKIA…, ghp_…, github_pat_…, xox[baprs]- patterns at write time,
# so new archives never contain them. This config is a belt-and-suspenders
# safeguard: if any future archive slips through, GitHub's scanner will
# not flag it from these paths.
#
# Docs:
#   https://docs.github.com/en/code-security/secret-scanning/using-advanced-secret-scanning-and-push-protection-features/excluding-folders-and-files-from-secret-scanning

paths-ignore:
  - "licenses/*/analysis-sources/**"
